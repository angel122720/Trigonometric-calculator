<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trig Identity Verifier</title>
    <!-- Mas mabilis na link para sa Math Library -->
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --blue: #d1d9ff; --green: #d4edda; --purple: #f3e5f5; --orange: #ffe5d9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-layout { display: flex; gap: 20px; max-width: 900px; width: 100%; flex-wrap: wrap; justify-content: center; }
        .calculator-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex: 1; min-width: 320px; border-top: 10px solid #1a4a72; }
        h1 { color: #1a4a72; margin-bottom: 5px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 18px; box-sizing: border-box; margin-bottom: 10px; }
        .check-btn { width: 100%; padding: 15px; background: #1a4a72; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #result { margin-top: 20px; padding: 20px; border-radius: 10px; text-align: center; font-weight: bold; display: none; }
        .formula-sidebar { flex: 0.6; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; min-width: 300px; }
        .card { padding: 15px; border-radius: 10px; font-size: 0.85em; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<h1>Trig Identity Verifier</h1>
<p>BSED Mathematics: TTL Project</p>

<div class="main-layout">
    <div class="calculator-card">
        <label>Left-Hand Side (LHS):</label>
        <input type="text" id="lhs" placeholder="sin(x) / cos(x)">
        <div style="text-align: center; font-size: 20px; margin: 5px;">=</div>
        <label>Right-Hand Side (RHS):</label>
        <input type="text" id="rhs" placeholder="tan(x)">
        <button class="check-btn" onclick="verify()">Check Identity</button>
        <div id="result"></div>
    </div>

    <div class="formula-sidebar">
        <div class="card blue"><b>Quotient</b><br>tan x = sin x / cos x</div>
        <div class="card green"><b>Reciprocal</b><br>sec x = 1 / cos x</div>
        <div class="card purple"><b>Pythagorean</b><br>sin²x + cos²x = 1</div>
        <div class="card orange"><b>Co-Function</b><br>sin(π/2 - x) = cos x</div>
    </div>
</div>

<script>
    function verify() {
        const lhsRaw = document.getElementById('lhs').value;
        const rhsRaw = document.getElementById('rhs').value;
        const res = document.getElementById('result');

        try {
            // Nililinis ang input: tinatanggal ang extra spaces
            const lhs = lhsRaw.toLowerCase().trim();
            const rhs = rhsRaw.toLowerCase().trim();

            if (!lhs || !rhs) {
                alert("Please fill in both sides!");
                return;
            }

            // Nagte-test sa tatlong magkaibang anggulo para sigurado (in radians)
            const testAngles = [0.5, 1.2, 2.8];
            let isCorrect = true;

            testAngles.forEach(valX => {
                const valL = math.evaluate(lhs, { x: valX });
                const valR = math.evaluate(rhs, { x: valX });
                if (Math.abs(valL - valR) > 0.001) isCorrect = false;
            });

            res.style.display = "block";
            if (isCorrect) {
                res.innerHTML = "✅ CORRECT IDENTITY!";
                res.style.background = "#d4edda"; res.style.color = "#155724";
            } else {
                res.innerHTML = "❌ NOT AN IDENTITY";
                res.style.background = "#f8d7da"; res.style.color = "#721c24";
            }
        } catch (e) {
            alert("Format Error! Use (x) and * for multiply.\nExample: 2 * sin(x)");
        }
    }
</script>
</body>
</html>
